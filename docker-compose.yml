services:
    nginx:
        image: nginx:1.29.8
        depends_on:
            - php
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf
            - ./:/app
        ports:
            - "80:80"

    php:
        build:
            context: .
            dockerfile: PHP.Dockerfile
        volumes:
            - ./:/app
        env_file:
            - .env

    mysql:
        image: mariadb:noble
        volumes:
            - mysqldata:/var/lib/mysql
            - ./sql:/docker-entrypoint-initdb.d
        env_file:
            - .env
        ports:
            - 3306:3306

    phpmyadmin:
        image: phpmyadmin:latest
        ports:
            - 8080:80
        environment:
            - PMA_HOST=mysql

volumes:
    mysqldata: {}
